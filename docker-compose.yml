services:
  # ===== Spring Boot Backend =====
  backend:
    build:
      context: ./apps/backend-springboot
      dockerfile: Dockerfile
    ports:
      - "8002:8080"
    environment:
      - PORT=8080
      # 透過 host.docker.internal 連接宿主機上由另一個 Docker 啟動的 MongoDB
      # 若 MongoDB 啟用驗證，格式為 mongodb://帳號:密碼@host.docker.internal:27017/spatialmeet?authSource=admin
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@host.docker.internal:27017/spatialmeet?authSource=admin
      - JWT_SECRET=NWtI0DCq4qI4xb8qbNBU54HVHTZoF8P3qb9055qUDIRKJ0CEtdUuwjm0FiI6H5RY
      - ADMIN_PASSWORD=admin
      # CORS 允許來自 frontend 容器與本地瀏覽器的請求
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    extra_hosts:
      # Linux 環境相容性設定：讓 host.docker.internal 解析到宿主機 IP
      # macOS / Windows 上 Docker Desktop 已內建此映射，無需額外設定
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ===== Next.js Frontend =====
  frontend:
    build:
      context: ./apps/frontend-nextjs
      dockerfile: Dockerfile
      args:
        # 建構時注入公開 URL（供瀏覽器端 JS 使用，指向宿主機對外 port）
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://r.yicheng.uk}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://r.yicheng.uk}
        # Next.js rewrites() 在 next build 時烘焙，須以 build ARG 傳入
        # 指向 Docker 內部服務名稱，讓 Next.js server 端直接與 backend 通訊
        - NEXT_BACKEND_INTERNAL_URL=http://backend:8080
    ports:
      - "8003:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
