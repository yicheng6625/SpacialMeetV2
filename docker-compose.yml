services:
  # ===== Spring Boot Backend =====
  backend:
    build:
      context: ./apps/backend-springboot
      dockerfile: Dockerfile
    ports:
      - "8002:8080"
    environment:
      - PORT=8080
      # 透過 host.docker.internal 連接宿主機上由另一個 Docker 啟動的 MongoDB
      - MONGODB_URI=mongodb://host.docker.internal:27017/spatialmeet
      - JWT_SECRET=NWtI0DCq4qI4xb8qbNBU54HVHTZoF8P3qb9055qUDIRKJ0CEtdUuwjm0FiI6H5RY
      - ADMIN_PASSWORD=admin
      # CORS 允許來自 frontend 容器與本地瀏覽器的請求
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    extra_hosts:
      # Linux 環境相容性設定：讓 host.docker.internal 解析到宿主機 IP
      # macOS / Windows 上 Docker Desktop 已內建此映射，無需額外設定
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ===== Next.js Frontend =====
  frontend:
    build:
      context: ./apps/frontend-nextjs
      dockerfile: Dockerfile
      args:
        # 建構時注入公開 URL（供瀏覽器端 JS 使用，指向宿主機對外 port）
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    ports:
      - "8003:3000"
    environment:
      - NODE_ENV=production
      # 服務端 rewrite 使用 Docker 內部服務名稱路由，避免走宿主機網路
      - NEXT_BACKEND_INTERNAL_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
